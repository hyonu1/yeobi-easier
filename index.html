<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <!-- 0초 뒤에 메인 주소로 자동 이동 (가장 빠르고 확실한 방법) -->
    <meta http-equiv="refresh" content="0; url=https://hyonu1.github.io/ybez/">
    <title>여비-이지 통합 페이지 안내</title>
    
    <!-- 혹시 메타 태그가 작동안할 경우를 대비한 자바스크립트 이동 스크립트 -->
    <script>
        window.location.replace("https://hyonu1.github.io/ybez/");
    </script>
</head>
<body>
    <!-- 매우 드물게 자동 이동이 안 되는 환경(구형 브라우저 등)을 위한 안내 텍스트 -->
    <p>새로운 여비-이지(ybez) 사이트로 이동 중입니다...</p>
    <p>만약 3초 이상 화면이 멈춰있다면 <a href="https://hyonu1.github.io/ybez/">여기</a>를 클릭해 주세요.</p>
</body>
</html>
