    };
    return map[n]||raw;
  },[compactPlaceName]);

  const verticalRouteRows=useMemo(()=>{
    if(!result)return [];
    const rows=[];
    const push=(from,to,fare,source,note,kind)=>{
      if(!from&&!to)return;
      rows.push({
        from:terminalNameFor(from,"from",to),
        to:terminalNameFor(to,"to",from),
        rawFrom:from,rawTo:to,
        fare:fare==null?null:Number(fare)||0,
        source:formatSourceLabel(source),note:note||"",kind:kind||"bus"
      });
    };

    const islandLegs=result.islandLegs||[];
    const clean=(v)=>compactPlaceName(v);
    const originKey=nz(origin);
    const destKey=nz(dest);
    const originInfo=ISLAND_DB[originKey]||ISLAND_DB[clean(origin)]||null;
    const destInfo=ISLAND_DB[destKey]||ISLAND_DB[clean(dest)]||null;
    const originName=clean(origin);
    const destName=clean(dest);
    const parseLeg=(x)=>String(x?.route||"").split("→").map(v=>v.trim());
    const touches=(x,placeName)=>{
      if(!placeName)return false;
      const [a,b]=parseLeg(x);
      return clean(a)===placeName||clean(b)===placeName;
    };
    const sameLeg=(a,b)=>a===b;
    const originIslandLegs=originInfo?islandLegs.filter(x=>x.role==="origin"||touches(x,originName)):[];
    const destIslandLegs=destInfo?islandLegs.filter(x=>!originIslandLegs.some(o=>sameLeg(o,x))&&(x.role==="dest"||touches(x,destName))):[];
    const otherIslandLegs=islandLegs.filter(x=>!originIslandLegs.some(o=>sameLeg(o,x))&&!destIslandLegs.some(d=>sameLeg(d,x)));

    const pushIslandLeg=(x,role)=>{
      let [a,b]=parseLeg(x);
      const info=role==="origin"?originInfo:role==="dest"?destInfo:null;
      if(role==="origin"){
        // 출발 특수지역은 반드시 사용자 출발지 → 허브 순서로 표시
        if(!a||!b){a=origin;b=info?.hub||b;}
        if(clean(b)===originName||clean(a)===clean(info?.hub||"")){[a,b]=[b,a];}
        if(clean(a)!==originName&&info?.hub){a=origin;b=info.hub;}
      }else if(role==="dest"){
        // 도착 특수지역은 반드시 허브 → 사용자 도착지 순서로 표시
        if(!a||!b){a=info?.hub||a;b=dest;}
        if(clean(a)===destName||clean(b)===clean(info?.hub||"")){[a,b]=[b,a];}
        if(clean(b)!==destName&&info?.hub){a=info.hub;b=dest;}
      }
      const note=x.kind==="ferry"?"기타교통비 참고 · 실제 이용액 입력":"편도 참고 · 실제 이용 시 추가교통비 입력";
      push(a||origin,b||dest,x.fare,x.source||x.kind,note,x.kind);
    };

    // 특수 접근구간은 kind가 아니라 출발/도착 방향으로 배치한다.
    originIslandLegs.forEach(x=>pushIslandLeg(x,"origin"));

    // 전남·광주 밖 하위검색어가 출발지인 경우: 하위지역 → 중심허브 접근구간을 표시만 한다.
    // 접근비용은 자동 합산하지 않고 추가 교통비 입력 안내로 분리한다.
    if(!selSub&&originExternalSubInfo){
      const fromName=originExternalSubInfo.placeName||origin;
      const hubName=originExternalSubInfo.center||originExternalSubInfo.areaName;
      if(fromName&&hubName&&clean(fromName)!==clean(hubName)){
        push(fromName,hubName,null,"NAVER","접근비용 별도 입력 · 실제 이용 시 추가교통비 입력","access");
      }
    }

    if(selSub){
      const subNote=selSub.sameLiving?"동일생활권 간주 0원 선택":"선택한 인근 터미널 직통";
      push(selSub.depName||origin,selSub.arrName||dest,selSub.gen,(selSub.sources||[])[0]||"네이버지도 검증요금",subNote,"bus");
    }else if(result.areaSegments?.length){
      result.areaSegments.forEach(seg=>push(seg.from,seg.to,seg.gen,seg.sourceLabel||seg.source||"네이버지도 검증요금",seg.note,"bus"));
    }else if(result.multiHop?.segs?.length){
      result.multiHop.segs.forEach(seg=>push(seg.depName||seg.from,seg.arrName||seg.to,seg.gen,(seg.sources||[])[0]||seg.sourceLabel,seg.note,"bus"));
    }else if(result.seg1&&result.seg2){
      push(result.seg1.depName||result.seg1.from,result.seg1.arrName||result.seg1.to,result.seg1.gen,(result.seg1.sources||[])[0],result.seg1.note,"bus");
      push(result.seg2.depName||result.seg2.from,result.seg2.arrName||result.seg2.to,result.seg2.gen,(result.seg2.sources||[])[0],result.seg2.note,"bus");
    }else{
      const parts=String(result.routeLabel||displayRouteLabel||`${origin} → ${dest}`).split(/\s*→\s*/).map(x=>x.trim()).filter(Boolean);
      if(parts.length>=2){
        const fare=result.needsManualFare?null:(selSub?.gen??result.gen);
        push(parts[0],parts[parts.length-1],fare,(result.sources||[])[0]||"네이버지도 검증요금",result.areaMethod||"대표 구간 산정","bus");
      }else{
        push(origin,dest,result.needsManualFare?null:(selSub?.gen??result.gen),(result.sources||[])[0]||"네이버지도 검증요금",result.areaMethod||"대표 구간 산정","bus");
      }
    }

    // 전남·광주 밖 하위검색어가 도착지인 경우: 중심허브 → 하위지역 접근구간을 마지막에 표시한다.
    // 이미 areaSegments가 해당 하위지역까지 포함한 경우에는 중복 표시하지 않는다.
    if(!selSub&&destExternalSubInfo){
      const hubName=destExternalSubInfo.center||destExternalSubInfo.areaName;
      const toName=destExternalSubInfo.placeName||dest;
      const last=rows[rows.length-1];
      const lastTo=clean(last?.rawTo||last?.to||"");
      if(hubName&&toName&&clean(hubName)!==clean(toName)&&lastTo!==clean(toName)){
        push(hubName,toName,null,"NAVER","접근비용 별도 입력 · 실제 이용 시 추가교통비 입력","access");
      }
    }

    destIslandLegs.forEach(x=>pushIslandLeg(x,"dest"));
    otherIslandLegs.forEach(x=>{
      const [a,b]=parseLeg(x);
      const note=x.kind==="ferry"?"기타교통비 참고 · 실제 이용액 입력":"편도 참고 · 실제 이용 시 추가교통비 입력";
      push(a||origin,b||dest,x.fare,x.source||x.kind,note,x.kind);
    });

    return rows.filter((r,i,a)=>i===0||!(r.from===a[i-1].from&&r.to===a[i-1].to&&r.fare===a[i-1].fare&&r.kind===a[i-1].kind));
  },[result,selSub,origin,dest,displayRouteLabel,terminalNameFor,formatSourceLabel,compactPlaceName,originExternalSubInfo,destExternalSubInfo]);

  const buildDetailRows=useCallback((rows)=>{
    const out=[];
    if(result?.experimentalNationwide){
      out.push({icon:"⚠️",head:"전국-전국 참고용",body:"YBEZ 2Gen은 전남·광주 ↔ 전국 여비 산정에 최적화된 버전입니다. 이 결과는 검증되지 않은 참고용이며, 피드백 수집용입니다."});
    }
    const areaId=String(detailAreaInfo?.resolved?.areaId||"");
    const isJeonnamGeneral=areaId.startsWith("jg_");
    const ruralOrFerry=rows.find(r=>r.kind==="rural"||r.kind==="ferry"||/농어촌|여객선|기타교통비|조례/i.test(String(r.note||""))||String(r.source||"")==="조례");

    if(selSub?.sameLiving){
      out.push({icon:"◎",head:"동일생활권 간주",body:"남악·일로·오룡은 목포 생활권으로 보아 동일생활권 0원 후보로 선택할 수 있습니다."});
    }

    // 전남·광주 일반 생활권 설명은 숨긴다.
    // 단, 전남·광주 밖 하위검색어의 생활권/접근비용 설명과 신안·완도 특수 안내는 유지한다.
    if(externalSubDetailInfo){
      const place=externalSubDetailInfo.placeName||externalSubDetailInfo.destName;
      const center=externalSubDetailInfo.center||externalSubDetailInfo.areaName;
      const centerTerm=terminalNameFor(center,"from",place);
      const destTerm=terminalNameFor(place,"to",center);
      out.push({icon:"⌂",head:"하위지역 설명",body:`${place}은 ${center} 기준 생활권 하위지역입니다.`});
      out.push({icon:"↳",head:"접근비용 안내",body:`${centerTerm} 기준 관내·접근권으로 처리합니다. 실제 이용 시 ${centerTerm} → ${destTerm} 접근비용은 추가 교통비에 입력합니다.`});
    }

    if(ruralOrFerry){
      const isFerry=ruralOrFerry.kind==="ferry"||/여객선|도선|기타교통비/i.test(String(ruralOrFerry.note||""));
      const targetInput=isFerry?"기타교통비":"추가 교통비";
      const fareText=ruralOrFerry.fare!=null?` ${fmt(ruralOrFerry.fare)}원 참고`:"";
      out.push({icon:"⚓",head:"조례·특수 안내",body:`${ruralOrFerry.from} → ${ruralOrFerry.to}${fareText} · 실제 이용 시 ${targetInput}에 입력합니다.`});
    }else if(!externalSubDetailInfo&&displaySupportNote&&!isJeonnamGeneral){
      out.push({icon:"※",head:"산정 보조 설명",body:String(displaySupportNote).replace(/^\*\s*/,"")});
    }

    if((result?.islandRouteLabel||result?.isShipOnlyRoute||result?.shipCost>0)&&!out.some(x=>x.head==="조례·특수 안내")){
      out.push({icon:"⚓",head:"조례·특수 안내",body:"신안·완도 등 섬지역은 여객선·도선 비용을 기타교통비에 별도 입력합니다. 예: 신안군 여객선 운영 및 지원 조례"});
    }
    if(!out.length){
      out.push({icon:"i",head:"산정 기준",body:"위 구간요금은 선택한 터미널 기준 참고금액이며, 실제 예매 시 금액과 다를 수 있습니다."});
    }
    return out.slice(0,3);
  },[destLivingAreaLabel,detailAreaInfo,displaySupportNote,result,terminalNameFor,compactPlaceName,selSub,externalSubDetailInfo]);

  const VerticalRouteTable=()=>{
    if(!result)return(
      <div className="vertical-route-card">
        <div className="vroute-title"><span>터미널 기준 산정표</span><small>검색 후 표시</small></div>
        <div className="vroute-detail">
          <div className="vroute-detail-row">
            <div className="vroute-detail-ico">i</div>
            <div><div className="vroute-detail-head">산정 전</div><div className="vroute-detail-body">출발지와 도착지를 검색하면 터미널 기준 구간요금이 표시됩니다.</div></div>
          </div>
        </div>
      </div>
    );
    const rows=verticalRouteRows;
    if(!rows.length)return null;
    const detailRows=buildDetailRows(rows);
    return(
      <div className="vertical-route-card">
        <div className="vroute-title"><span>터미널 기준 산정표</span><small>구간요금·출처</small></div>
        <div className="vroute-main">
          <div className="vroute-list">
            <div className="vroute-node">
              <div className="vroute-dot"/>
              <div><div className="vroute-node-name">{rows[0].from}</div><div className="vroute-node-sub">출발지</div></div>
            </div>
            {rows.map((r,i)=>(
              <React.Fragment key={i}>
                <div className="vroute-edge">
                  <span className={`vroute-fare ${r.fare==null?"warn":""}`}>{r.fare==null?"수기확인":`${fmt(r.fare)}원`}</span>
                  <span className="vroute-meta"><span className={`vroute-src-tag tag-${String(r.source||"").toLowerCase()}`}>{r.source}</span>{r.note&&<span className="vroute-note-inline">{/접근/i.test(r.note)?"접근비용":r.kind==="rural"?"추가교통비":r.kind==="ferry"?"기타교통비":/농어촌/i.test(r.note)?"추가교통비":/여객선|기타|조례/i.test(r.note)?"기타교통비":"산정근거"}</span>}</span>
                </div>
                <div className={`vroute-node ${i===rows.length-1?"dest":""}`}>
                  <div className="vroute-dot"/>
                  <div><div className="vroute-node-name">{r.to}</div><div className="vroute-node-sub">{i===rows.length-1?"도착지":"환승/경유"}</div></div>
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>
        <div className="vroute-detail">
          <div className="vroute-detail-title">세부 산정 근거</div>
          {detailRows.map((d,i)=>(
            <div className="vroute-detail-row" key={i}>
              <div className="vroute-detail-ico">{d.icon}</div>
              <div><div className="vroute-detail-head">{d.head}</div><div className="vroute-detail-body">{d.body}</div></div>
            </div>
          ))}
        </div>
        <div className="vroute-source-legend">
          {["JNE","NAVER","BUSTAGO","KOBUS","TMONEY","조례"].map((x,i)=><span key={x} className="vroute-legend-chip"><span className="vroute-legend-dot" style={{background:["#007AFF","#7C3AED","#F59E0B","#10B981","#06B6D4","#6B7280"][i]}}/>{x}</span>)}
        </div>
      </div>
    );
  };


  const MobileFareChoices=()=>{
    if(!result)return null;
    const {depSubs=[],arrSubs=[],specialSubs=[]}=subResults||{};
    const showSubs=!(nz(via)||result.via);
    const hasChoices=showSubs&&(specialSubs.length||depSubs.length||arrSubs.length);
    if(!hasChoices)return null;
    const ChoiceCard=({selected,onClick,route,price,tag})=>(
      <div className={`fare-option-card ${selected?"selected":""}`} onClick={onClick}>
        <div className="fare-option-left">
          <span className="fare-radio"/>
          <div style={{minWidth:0}}>
            <div className="fare-option-name">{route}{tag?<span className="tag-side" style={{marginLeft:8,background:"#F0F7FF",color:"var(--blue)",borderColor:"rgba(0,122,255,.18)"}}>{tag}</span>:null}</div>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div className="fare-option-price">{price==null?"수기확인":`${fmt(price)}원`}</div>
        </div>
      </div>
    );
    const autoSubs=[...depSubs.slice(0,3),...arrSubs.slice(0,3)];
    return(
      <div>
        <div className="mobile-detail-section-title"><span>요금 선택</span><small style={{fontSize:10,color:"#8E8E93",fontWeight:900}}>후보 선택 가능</small></div>
        <div className="fare-choice-wrap">
          <ChoiceCard selected={selSub===null} onClick={()=>setSelSub(null)} route={displayRouteLabel} price={result.needsManualFare?null:candidateFare(result,grade)}/>
          {specialSubs.map((r,i)=><ChoiceCard key={`m-special-${i}`} selected={selSub===r} onClick={()=>setSelSub(selSub===r?null:r)} route={`${r.depName} → ${r.arrName}`} price={candidateFare(r,grade)} tag={r.routeTag||"동일생활권"}/>) }
          {autoSubs.length>0&&<>
            <button type="button" className="sub-choice-toggle" onClick={()=>setShowSubChoices(v=>!v)}>
              {showSubChoices?"참고용 인근 터미널 요금 접기 ▲":`참고용 인근 터미널 요금 보기 ▼ (${autoSubs.length}건)`}
            </button>
            {showSubChoices&&<div className="sub-choice-note">선택한 시·군의 인근 터미널 직통요금입니다. 실제 이용 터미널이 다를 때만 참고하세요.</div>}
            {showSubChoices&&autoSubs.map((r,i)=><ChoiceCard key={`m-sub-${i}`} selected={selSub===r} onClick={()=>setSelSub(selSub===r?null:r)} route={`${r.depName} → ${r.arrName}`} price={candidateFare(r,grade)}/>) }
          </>}
        </div>
      </div>
    );
  };

  const MobileDetailSheet=()=>{
    if(!mobileDetailOpen||!result||modalSt.type)return null;
    const fare=result.needsManualFare?null:selectedFare;
    const hasChoices=!(nz(via)||result.via)&&!!((subResults?.specialSubs?.length||0)+(subResults?.depSubs?.length||0)+(subResults?.arrSubs?.length||0));
    return(
      <div className="mobile-detail-backdrop" onClick={e=>e.stopPropagation()}>
        <div className="mobile-detail-sheet" onClick={e=>e.stopPropagation()}>
          <div className="mobile-detail-handle"/>
          <div className="mobile-detail-header">
            <div className="mobile-detail-title-row">
              <div className="mobile-detail-title">{displayRouteLabel||`${origin} → ${dest}`}</div>
              <div className="mobile-detail-pill">산정내역</div>
            </div>
            <div className="mobile-detail-fare-row">
              <div>
                <div className="mobile-detail-fare-main">{fare==null?"수기확인":`${fmt(fare)}원`}</div>
                <div className="mobile-detail-fare-sub">편도 기준 · 왕복 {fare==null?"수기확인":`${fmt(fare*2)}원`}</div>
              </div>
              {hasChoices&&<div style={{fontSize:11,fontWeight:900,color:"#F59E0B",background:"#FFFBEB",border:"1px solid #FEF3C7",borderRadius:999,padding:"5px 9px",whiteSpace:"nowrap"}}>후보 있음</div>}
            </div>
          </div>
          <div className="mobile-detail-body">
            <MobileFareChoices/>
            <div className="mobile-detail-section-title"><span>터미널 기준 산정표</span></div>
            <VerticalRouteTable/>
          </div>
          <div className="mobile-detail-footer">
            <button className="mobile-sheet-btn main" onClick={resetToMainKeepOrigin}>⌂ MAIN</button>
            <button className="mobile-sheet-btn calc" onClick={()=>{setMobileDetailOpen(false);setShowDetail(true);}}>📋 여비계산</button>
          </div>
        </div>
      </div>
    );
  };

  if(!loaded&&!dataErr)return(
    <div style={{minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <span style={{fontFamily:"var(--gm)",fontSize:36,fontWeight:900,color:"var(--blue)"}}>YBEZ</span>
      <div className="dot-pulse flex gap-1.5">{[0,1,2].map(i=><span key={i} style={{animationDelay:`${i*.2}s`}}/>)}</div>
      <p style={{fontSize:12,color:"#AEAEB2",fontWeight:700}}>노선 DB 로딩 중...</p>
    </div>
  );
  if(dataErr)return(
    <div style={{minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:20}}>
      <span style={{fontSize:40}}>⚠️</span>
      <p style={{fontWeight:900,fontSize:16}}>데이터 로딩 실패</p>
      <p style={{fontSize:12,color:"#6E6E73",fontWeight:600,textAlign:"center"}}>{dataErr}</p>
      <code style={{fontSize:11,color:"#AEAEB2"}}>python -m http.server 8080</code>
    </div>
  );

  /* ── 렌더 ── */
  return(
    <div className="dashboard">

      {/* ══ 왼쪽: 터미널 기준 산정표 (지도 대체) ══ */}
      <div className="col-left" style={modalSt.type?{visibility:"hidden"}:{}}>
        <div className="sec-hdr">
          <span>🧾 터미널 기준 산정표</span>
          <span style={{fontSize:10,color:"#8E8E93",fontWeight:800}}>구간요금·출처</span>
        </div>
        <VerticalRouteTable/>
      </div>

      {/* ══ 가운데: 검색 + 결과 ══ */}
      <div className="col-center">
        {/* 헤더 */}
        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid var(--sep)",background:"rgba(255,255,255,0.95)",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
          <div>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontFamily:"var(--gm)",fontSize:26,fontWeight:900,color:"var(--blue)"}}>YBEZ 2Gen</span>
              <span style={{fontSize:12,fontWeight:800,color:"#F59E0B"}}>(BETA)</span>
            </div>
            <div style={{fontSize:10,fontWeight:700,color:"#AEAEB2",marginTop:2}}>전남·광주 ↔ 전국 여비 산정 최적화 버전 · 제작: 전현우@해남우수영초</div>

            <div className={`mode-txt ${intraCityOpen?"on":"off"}`}>관내</div>

          <AcInput label="도착지" placeholder="도착지" value={dest}

          {/* 경유지는 자동완성 선택창과 겹치지 않도록 도착지 아래쪽에 배치 */}
          {!showVia?(
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:-2,marginBottom:2}}>
              <button onClick={()=>setShowVia(true)}
                style={{height:28,padding:"0 10px",borderRadius:9,border:"1px solid #E0E0E0",background:"#F5F5F5",color:"#AEAEB2",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--gm)"}}>
                + 경유지 추가
              </button>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
              <div style={{flex:1}}>
                <AcInput label="경유지" placeholder="경유지 (선택)" value={via}
                  onChange={v=>{setVia(v);}}
                  onSelect={c=>{if(c){setVia(c);performCalc(origin,dest,c);}}}
                  list={cityList} mascotMap={mascotMap}/>
              </div>
              <button onClick={()=>{setShowVia(false);setVia("");performCalc(origin,dest,"");}}
                style={{flexShrink:0,width:28,height:28,borderRadius:8,border:"1px solid #E0E0E0",background:"#F5F5F5",color:"#8E8E93",fontSize:14,fontWeight:700,cursor:"pointer",lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
          )}

          {/* 상태바 */}
          <div className={`status-bar ${calcSt==="done"?"sb-done":"sb-idle"}`}>
            {calcSt==="working"?(
              <><div className="dot-pulse flex gap-1">{[0,1,2].map(i=><span key={i} style={{animationDelay:`${i*.2}s`}}/>)}</div><span>노선 탐색 중...</span></>
            ):calcSt==="done"?(
              <><span style={{color:"#D97706",fontWeight:800}}>⚠️ BETA 버전</span><span style={{color:"#6B7280",fontWeight:700,marginLeft:6}}>오류·누락은 050-6966-6696 / JNE Messenger로 제보해주세요</span></>
            ):<span>초성 검색 가능 · {cityList.length}개 지역</span>}
          </div>
        </div>

        {/* 결과 */}
        <div className="result-wrap">
          {result&&(
            <>
              {result.experimentalNationwide&&(<div style={{marginBottom:12,padding:"12px 14px",borderRadius:18,background:"#FFF7ED",border:"1px solid #FDBA74",boxShadow:"0 6px 18px rgba(251,146,60,.12)"}}>
                <div style={{fontWeight:950,color:"#C2410C",fontSize:13,marginBottom:4}}>⚠️ 전국-전국 참고용 경로입니다.</div>
                <div style={{fontWeight:750,color:"#7C2D12",fontSize:11,lineHeight:1.45,wordBreak:"keep-all"}}>YBEZ 2Gen은 전남·광주 ↔ 전국 여비 산정에 최적화된 버전입니다. 이 결과는 검증되지 않은 참고용이며, 피드백 수집용입니다.</div>
              </div>)}

              {/* 통합 요금 후보 선택: 경로와 금액을 한 카드 안에서 선택 */}
              {(()=>{
                const {depSubs=[],arrSubs=[],specialSubs=[]}=subResults||{};
                // 경유지 검색 시에는 후보 선택을 단순화한다.
                const showSubs=!(nz(via)||result.via);
                const compactSources=(arr)=>{
                  const vals=[...new Set((arr||[]).map(s=>formatSourceLabel(s)).filter(Boolean))];
                  if(!vals.length)return "대표 산정";
                  if(vals.length===1)return vals[0];
                  return vals.join(" → ");
                };
                const ChoiceCard=({selected,onClick,route,price,tag})=>(
                  <div className={`fare-option-card ${selected?"selected":""}`} onClick={onClick}>
                    <div className="fare-option-left">
                      <span className="fare-radio"/>
                      <div style={{minWidth:0}}>
                        <div className="fare-option-name">{route}{tag?<span className="tag-side" style={{marginLeft:8,background:"#F0F7FF",color:"var(--blue)",borderColor:"rgba(0,122,255,.18)"}}>{tag}</span>:null}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div className="fare-option-price">{price==null?"수기확인":`${fmt(price)}원`}</div>
                    </div>
                  </div>
                );
                const mainSources=compactSources(result.sources);
                const autoSubs=[...depSubs.slice(0,3),...arrSubs.slice(0,3)];
                return(
                  <div className="fare-choice-wrap">
                    <ChoiceCard
                      selected={selSub===null}
                      onClick={()=>setSelSub(null)}
                      route={displayRouteLabel}
                      price={result.needsManualFare?null:candidateFare(result,grade)}
                    />

                    {showSubs&&specialSubs.map((r,i)=>(
                      <ChoiceCard
                        key={`special-${i}`}
                        selected={selSub===r}
                        onClick={()=>setSelSub(selSub===r?null:r)}
                        route={`${r.depName} → ${r.arrName}`}
                        price={candidateFare(r,grade)}
                        tag={r.routeTag||"동일생활권 간주"}
                      />
                    ))}
                    {showSubs&&autoSubs.length>0&&(<>
                      <button type="button" className="sub-choice-toggle" onClick={()=>setShowSubChoices(v=>!v)}>
                        {showSubChoices?"참고용 인근 터미널 요금 접기 ▲":`참고용 인근 터미널 요금 보기 ▼ (${autoSubs.length}건)`}
                      </button>
                      {showSubChoices&&<div className="sub-choice-note">선택한 시·군의 인근 터미널 직통요금입니다. 실제 이용 터미널이 다를 때만 참고하세요.</div>}
                      {showSubChoices&&autoSubs.map((r,i)=>(
                        <ChoiceCard
                          key={`sub-${i}`}
                          selected={selSub===r}
                          onClick={()=>setSelSub(selSub===r?null:r)}
                          route={`${r.depName} → ${r.arrName}`}
                          price={candidateFare(r,grade)}
                        />
                      ))}
                    </>)}
                  </div>
                );
              })()}
            </>
          )}
          {!result&&calcSt==="error_no_route"&&(
          <div className="empty-state">
            <span style={{fontSize:40}}>🚧</span>
            <span style={{fontSize:15,fontWeight:900,color:"#FF3B30"}}>경로를 찾을 수 없습니다</span>
            <span style={{fontSize:12,color:"#6E6E73",textAlign:"center",marginTop:4,lineHeight:1.5}}>해당 구간의 요금 데이터가 없거나,<br/>터미널 세분화로 인해 노선 연결이 단절된 상태입니다.</span>
          </div>
        )}
        {/* 가운데 하단 버튼 바 (PC) */}
        <div className="bottom-action-bar desktop-only">
          <button className="action-btn" onClick={resetToMainKeepOrigin}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span className="tooltip">도착지 초기화 (출발지 유지)</span>
          </button>
          <div style={{position:"relative"}}>
            <button className={`action-btn ${showHist?"active":""}`} onClick={()=>setShowHist(v=>!v)}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
              <span className="tooltip">최근 검색 기록</span>
            </button>
            {showHist&&(
              <div className="hist-popup" onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:10,fontWeight:800,color:"#AEAEB2",padding:"4px 14px 8px",borderBottom:"1px solid #F2F2F7"}}>최근 검색</div>
                {history.length===0
                  ?<div style={{padding:"14px 16px",textAlign:"center",fontSize:12,color:"#AEAEB2",fontWeight:700}}>기록이 없습니다</div>
                  :history.slice(0,10).map((h,i)=>(
                    <div key={i} className="hist-item" onClick={()=>{setOrigin(h.from);setDest(h.to);setShowHist(false);setShowMap(true);performCalc(h.from,h.to);}}>
                      <span style={{color:"#374151",fontSize:13}}>{h.from} <span style={{color:"#C7C7CC"}}>→</span> {h.to}</span>
                      <span style={{color:"var(--blue)",fontFamily:"var(--gm)",fontSize:12,marginLeft:8,fontWeight:800}}>{(h.gen||0).toLocaleString()}원</span>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
        </div>
        </div>

        {/* 모바일 하단 내비 바 */}
        {!mobileDetailOpen&&<nav className="mobile-bottom-nav">
          {/* 홈 (출발지 남기고 초기화) */}
          <div className="mnav-home" onClick={resetToMainKeepOrigin}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(0,122,255,0.7)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          {/* 히스토리 */}
          <div style={{position:"relative"}}>
            <button className="mnav-btn" onClick={()=>setShowHist(v=>!v)}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={showHist?"var(--blue)":"#ADB5BD"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            </button>
            {showHist&&(
              <div className="mnav-hist-popup" onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:10,fontWeight:800,color:"#AEAEB2",padding:"4px 14px 6px",borderBottom:"1px solid rgba(0,0,0,0.05)"}}>최근 검색</div>
                {history.length===0
                  ?<div style={{padding:"12px 16px",textAlign:"center",fontSize:12,color:"#AEAEB2",fontWeight:700}}>기록이 없습니다</div>
                  :history.slice(0,5).map((h,i)=>(
                    <div key={i} className="hist-item" onClick={()=>{setOrigin(h.from);setDest(h.to);setShowHist(false);performCalc(h.from,h.to);}}>
                      <span style={{color:"#374151",fontSize:12}}>{h.from} <span style={{color:"#C7C7CC"}}>→</span> {h.to}</span>
                      <span style={{color:"var(--blue)",fontFamily:"var(--gm)",fontSize:11,marginLeft:8,fontWeight:800}}>{(h.gen||0).toLocaleString()}원</span>
                    </div>
                  ))
                }
              </div>
            )}
          </div>
          {/* 여비계산 */}
          <button className="mnav-calc" disabled={!result} onClick={()=>{if(result)setShowDetail(true);}}>

      </div>

        <div className="sec-hdr">일반/우등 선택</div>
        <div style={{padding:"12px 14px",borderBottom:"1px solid var(--sep)"}}>
          {result&&hasGradeChoice?(
            <div style={{display:"flex",gap:6}}>
              {[["gen","일반","#6366F1"],["pre","우등","#F59E0B"]].map(([g,lbl,c])=>{

                return(
                  <button key={g} className={`grade-btn ${g} ${grade===g?"sel":""}`} onClick={()=>setGrade(g)} style={{color:grade===g?c:"#6E6E73"}}>

                      <span className={`grade-radio ${grade===g?"sel":""}`} style={{color:c,borderColor:grade===g?c:"#D0D0D8"}}/>
                      <span style={{fontSize:14,fontWeight:800,fontFamily:"var(--gm)"}}>{lbl}</span>
                    </div>
                    <div style={{fontSize:17,fontWeight:900,fontFamily:"var(--gm)"}}>{fmt(fare)}<span style={{fontSize:9,marginLeft:2}}>원</span></div>

            </div>

            result?(

                <div>
                  <span style={{fontSize:20,fontWeight:900,color:"var(--blue)",fontFamily:"var(--gm)"}}>{fmt(selectedFare)}</span>

                  </div>
                </div>
              </div>
            ):(
              <div style={{padding:"14px 12px",textAlign:"center",color:"#C7C7CC",fontSize:11,fontWeight:700,lineHeight:1.6}}>출발지·도착지를<br/>먼저 조회하세요</div>
            )
          )}
        </div>

        {/* 여비계산 */}
        <div className="sec-hdr">🧾 여비계산</div>
        {DetailContent()} {/* 입력 UX 안정화: 컴포넌트 remount 방지 */}
      </div>

      {/* ── 모달들 ── */}
      {intraCityOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)"}} onClick={()=>{setIntraCityOpen(false);setShowMap(true);}}>
          <div style={{background:"linear-gradient(180deg,#FFFFFF,#FAFAFA)",boxShadow:"0 25px 50px rgba(0,0,0,0.25)",borderRadius:28,width:"100%",maxWidth:360,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <h3 style={{fontWeight:700,fontSize:20,color:"#1C1C1E",margin:0}}>관내 여비</h3>
                <button onClick={()=>{setIntraCityOpen(false);setShowMap(true);}} style={{background:"none",border:"none",fontSize:22,color:"#AEAEB2",cursor:"pointer",lineHeight:1}}>✕</button>
              </div>
              <div style={{marginBottom:16,padding:12,background:"#F8F9FA",borderRadius:12,border:"1px solid #E5E5EA",fontSize:13,fontWeight:500,color:"#374151",lineHeight:1.6}}>
                근무지 내의 출장은 별도의 영수증 증빙 없이 정액 지급됩니다.
              </div>
              <div style={{borderTop:"1px solid #F2F2F7",borderBottom:"1px solid #F2F2F7",padding:"16px 0",display:"flex",flexDirection:"column",gap:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:700,color:"#1C1C1E"}}>4시간 미만</span>
                  <Toggle on={intraDed.shortTime} onChange={v=>setIntraDed(p=>({...p,shortTime:v}))}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:700,color:"#1C1C1E"}}>관용차량 이용</span>
                  <Toggle on={intraDed.govVehicle} onChange={v=>setIntraDed(p=>({...p,govVehicle:v}))}/>
                </div>
              </div>
              <div style={{marginTop:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:18,fontWeight:700,color:"#1C1C1E"}}>지급액</span>
                <span style={{fontFamily:"var(--gm)",fontSize:24,fontWeight:900,color:"var(--blue)"}}>{fmt(20000-(intraDed.shortTime?10000:0)-(intraDed.govVehicle?10000:0))}원</span>
              </div>
              <button onClick={()=>{setIntraCityOpen(false);setShowMap(true);}} style={{width:"100%",marginTop:20,height:48,borderRadius:20,fontWeight:700,fontSize:17,background:"linear-gradient(180deg,#F0F7FF,#EBF4FF,#DFF0FF)",color:"var(--blue)",border:"1px solid #C7DCFF",cursor:"pointer"}}>닫기</button>
            </div>
          </div>
        </div>
      )}
      <MobileDetailSheet/>
      {/* 모바일 여비계산 모달 */}
      {showDetail&&(
        <div style={{position:"fixed",inset:0,zIndex:260,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end"}} onClick={closeTravelCalcOnMobile}>
          <div style={{width:"100%",background:"linear-gradient(180deg,#fff,#FAFAFA)",borderRadius:"24px 24px 0 0",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 32px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:"14px 20px 10px",borderBottom:"1px solid #F2F2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontFamily:"var(--gm)",fontSize:18,fontWeight:900,color:"#1C1C1E"}}>📋 여비계산</span>
              <button onClick={closeTravelCalcOnMobile} style={{background:"none",border:"none",fontSize:22,color:"#AEAEB2",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{padding:"14px 20px 24px"}}>
              {DetailContent()} {/* 입력 UX 안정화: 컴포넌트 remount 방지 */}
            </div>
          </div>
        </div>
      )}
      {modalSt.type&&(()=>{
        // 신안·완도 팝업은 지도형 미니맵을 호출하지 않고, 3열 마스코트 카드형으로만 표시한다.
        const POPUP_GROUP_MAP={"신안":"sinan","완도":"wando"};
        const groupKey=modalSt.popupKey||Object.keys(POPUP).find(k=>
          Array.isArray(POPUP[k])&&Array.isArray(modalSt.data)&&
          POPUP[k].length===modalSt.data.length&&POPUP[k][0]===modalSt.data[0]
        )||"";
        const groupId=POPUP_GROUP_MAP[groupKey]||"";
        const title=(mascotMap?.popup?.title_by_type?.[modalSt.type])||(
          modalSt.type==="origin"?"출발지를 선택해주세요.":modalSt.type==="via"?"경유지를 선택해주세요.":"목적지를 선택해주세요."
        );
        const cardList=(groupId&&Array.isArray(mascotMap?.popup?.[groupId]?.cards)&&mascotMap.popup[groupId].cards.length)
          ? mascotMap.popup[groupId].cards
          : (modalSt.data||[]);
        const triggerName=groupId==="sinan"?"신안":groupId==="wando"?"완도":(cardList[0]||"");
        const closePopup=()=>{
          markPopupResolved(modalSt.type,modalSt.popupKey||(modalSt.type==="origin"?origin:dest));
          setModalSt({type:null,data:[]});
          skipPopupOnceRef.current=true;
          setTimeout(()=>performCalc(origin,dest,via),0);
        };
        const selectPopupName=(name)=>{
          const isOri=modalSt.type==="origin";
          const isVia=modalSt.type==="via";
          markPopupResolved(isOri?"origin":(isVia?"via":"destination"),name);
          if(isOri)setOrigin(name);
          else if(isVia)setVia(name);
          else setDest(name);
          setModalSt({type:null,data:[]});
          skipPopupOnceRef.current=true;
          setTimeout(()=>performCalc(isOri?name:origin,isOri?dest:name,isVia?name:via),0);
        };

        return(
          <div style={{position:"fixed",inset:0,zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:14,background:"rgba(0,0,0,0.62)",backdropFilter:"blur(6px)"}}
            onClick={closePopup}>
            <div className="mascot-choice-modal" onClick={e=>e.stopPropagation()}>
              <div className="mascot-choice-header">
                <div className="mascot-choice-title">
                  <MascotIcon mascotMap={mascotMap} name={triggerName} size={28} className="modal-mascot-img"/>
                  <span>{title}</span>
                </div>
                <button className="mascot-choice-close" onClick={closePopup}>✕</button>
              </div>
              <div className="mascot-choice-body">
                <div className="mascot-choice-grid">
                  {cardList.map(name=>(
                    <button key={name} className={`mascot-choice-card ${groupId==="wando"?"wando-card":"sinan-card"}`} onClick={()=>selectPopupName(name)}>
                      <MascotIcon mascotMap={mascotMap} name={name} size={groupId==="wando"?46:50} className="mascot-choice-img"/>
                      <span className="mascot-choice-name">{name}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      })()}
      {activeModal&&(()=>{
        const mc=modalContent(activeModal);if(!mc)return null;
        return(
          <div className="modal-bg" onClick={()=>setActiveModal(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-hdr">
                <div>
                  <div style={{fontFamily:"var(--gm)",fontSize:17,fontWeight:900,color:"#fff"}}>{mc.title} 감액</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.75)",marginTop:2}}>{mc.desc}</div>
                </div>
                <button onClick={()=>setActiveModal(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
              <div className="modal-body" style={{display:"flex",flexDirection:"column",gap:0}}>
                {mc.items.map(item=>(
                  <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #F2F2F7"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{item.label}</div>
                      {item.sub&&<div style={{fontSize:11,color:"#AEAEB2",fontWeight:600}}>{item.sub}</div>}
                    </div>
                    <Toggle on={ded[item.id]} onChange={()=>setDed(prev=>{
                      const n={...prev};
                      if(["meal_1","meal_2","meal_3","meal_half"].includes(item.id)&&!prev[item.id])
                        ["meal_1","meal_2","meal_3","meal_half"].forEach(k=>n[k]=false);
                      n[item.id]=!prev[item.id];
                      // 일비 관용차 ↔ 교통비 관용차 양방향 연동
                      if(item.id==="gov_vehicle"){
                        n.transport_gov_vehicle=n.gov_vehicle;
                        if(n.gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}
                      }
                      if(item.id==="transport_gov_vehicle"){
                        n.gov_vehicle=n.transport_gov_vehicle;
                        // 교통비 관용차 선택 시 다른 교통비 감액 해제 (배타)
                        if(n.transport_gov_vehicle){n.transport_proof=false;n.transport_passenger=false;}
                      }
                      if(item.id==="transport_proof"&&n.transport_proof){n.transport_gov_vehicle=false;n.transport_passenger=false;n.gov_vehicle=false;}
                      if(item.id==="transport_passenger"&&n.transport_passenger){n.transport_gov_vehicle=false;n.transport_proof=false;n.gov_vehicle=false;}
                      return n;
                    })}/>
                  </div>
                ))}
                <button onClick={()=>setActiveModal(null)} className="confirm-btn">확인</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );


  /* DetailContent - 여비계산 패널 */
  function DetailContent(){
    return(
      <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:0}}>
        {/* 일비 */}
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <span style={{fontWeight:700,color:"#374151",fontSize:18,width:50}}>일비</span>
          <button onClick={()=>setActiveModal("daily")} className={`deduct-btn ${ded.gov_vehicle?"active":""}`}>감액</button>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",flex:1}}>
            <span style={{fontSize:20,fontWeight:900}}>{fmt(detailCost.daily)}원</span>
            {ded.gov_vehicle&&<span style={{fontSize:10,color:"var(--blue)",fontWeight:700}}>(-12,500)</span>}
          </div>
        </div>
        {/* 식비 */}
        <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
          <span style={{fontWeight:700,color:"#374151",fontSize:18,width:50}}>식비</span>
          <button onClick={()=>setActiveModal("meal")} className={`deduct-btn ${(ded.meal_1||ded.meal_2||ded.meal_3||ded.meal_half)?"active":""}`}>감액</button>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",flex:1}}>
            <span style={{fontSize:20,fontWeight:900}}>{fmt(detailCost.meal)}원</span>
            {mealLbl()&&<span style={{fontSize:10,color:"var(--blue)",fontWeight:700}}>{mealLbl()}</span>}
          </div>
        </div>
        {/* 교통비 */}
        <div style={{paddingTop:8,borderTop:"1px dashed #E5E5EA"}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:40}}>
            <div style={{display:"flex",alignItems:"center",gap:2}}>
              <span style={{fontSize:13,marginRight:2}}>🚌</span><span style={{fontWeight:700,color:"#374151",fontSize:18}}>교통비</span>
              <span className={`tag-side ${tagStyle("왕복")}`}>왕복</span>
            </div>
            <button onClick={()=>setActiveModal("transport")} className={`deduct-btn ${ded.transport_proof||ded.transport_gov_vehicle||ded.transport_passenger?"active":""}`}>감액</button>
            <div style={{textAlign:"right",flex:1}}>
              {!(ded.transport_proof||ded.transport_gov_vehicle||ded.transport_passenger)?(
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="tel" inputMode="numeric" pattern="[0-9]*" className="ship-input"
                      value={manualTransportInput}
                      onFocus={e=>{transportFocused.current=true;e.target.select();}} // 입력 UX 안정화
                      onBlur={()=>{transportFocused.current=false;setManualTransportInput(manualTransport==null||manualTransport===0?"":String(manualTransport));}} // 입력 UX 안정화
                      onChange={e=>{const v=onlyDigits(e.target.value);setManualTransportInput(v);setManualTransport(v===""?null:Number(v));}}
                      placeholder="0"/>
                    <span style={{fontSize:13,fontWeight:700}}>원</span>
                  </div>
                  {result?.surcharge>0&&<span style={{fontSize:9,fontWeight:700,color:"#059669"}}>추가 교통비 참고</span>}
                </div>
              ):(
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:20,fontWeight:900,color:"#AEAEB2"}}>0원</span>
                  {ded.transport_gov_vehicle&&<div style={{fontSize:9,color:"#F59E0B",fontWeight:700,marginTop:2}}>관용차 이용 · 미지급</div>}
                  {ded.transport_proof&&<div style={{fontSize:9,color:"#EF4444",fontWeight:700,marginTop:2}}>증빙 없음 · 미지급</div>}
                  {ded.transport_passenger&&<div style={{fontSize:9,color:"#8B5CF6",fontWeight:700,marginTop:2}}>동승 · 미지급</div>}
                </div>
              )}
            </div>
          </div>
          {showAccessExtraInput&&(
            <div style={{marginTop:6,padding:"7px 9px",borderRadius:10,background:"#F9FAFB",border:"1px solid #E5E7EB"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:34}}>
                <span style={{fontWeight:700,color:"#374151",fontSize:15}}>추가 교통비 <span className={`tag-side ${tagStyle("왕복")}`}>왕복</span></span>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <input type="tel" inputMode="numeric" pattern="[0-9]*" className="ship-input"
                    value={accessExtraInput}
                    onFocus={e=>{accessExtraFocused.current=true;e.target.select();}} // 입력 UX 안정화
                    onBlur={()=>{accessExtraFocused.current=false;setAccessExtraInput(accessExtraFare===0?"":String(accessExtraFare));}} // 입력 UX 안정화
                    onChange={e=>{const v=onlyDigits(e.target.value);setAccessExtraInput(v);setAccessExtraFare(v===""?0:Number(v));}}
                    placeholder="0"/>
                  <span style={{fontSize:14,fontWeight:700}}>원</span>
                </div>
              </div>
              {accessExtraHint&&<div style={{fontSize:9,color:"#6B7280",fontWeight:700,marginTop:2,lineHeight:1.35}}>{accessExtraHint}</div>}
            </div>
          )}
          {result&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",minHeight:36,marginTop:4}}>
              <span style={{fontWeight:700,color:"#374151",fontSize:16}}><span style={{fontSize:13,marginRight:3}}>🚢 ✈️</span>기타교통비</span>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="tel" inputMode="numeric" pattern="[0-9]*" className="ship-input"
                  value={shipFareInput}
                  onFocus={e=>{shipFareFocused.current=true;e.target.select();}} // 입력 UX 안정화
                  onBlur={()=>{shipFareFocused.current=false;setShipFareInput(shipFare===0?"":String(shipFare));}} // 입력 UX 안정화
                  onChange={e=>{const v=onlyDigits(e.target.value);setShipFareInput(v);setShipFare(v===""?0:Number(v));}}
                  placeholder="0"/>
                <span style={{fontSize:16,fontWeight:700}}>원</span>
              </div>
            </div>
          )}
        </div>
        {/* 합계 */}
        <div style={{paddingTop:10,borderTop:"2px solid #E5E5EA",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <span style={{fontWeight:900,fontSize:20}}>합계</span>
          <span style={{fontFamily:"var(--gm)",fontSize:24,fontWeight:900,color:"var(--blue)"}}>{fmt(detailCost.total)}<span style={{fontSize:13,marginLeft:2}}>원</span></span>
        </div>
        <button onClick={closeTravelCalcOnMobile} className="confirm-btn">닫기</button>
      </div>
    );
  }
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
